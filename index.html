<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Policy</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      ::-webkit-scrollbar {
        display: none;
      }

      :root {
        --bg-color: #f8f9f7;
        --section-color: #ffffff;
        --text-color: #1a1a1b;
        --link-color: #9a8265;
        --muted-color: #6f706b;
        --heading-color: #131314;
        --card-border: #e8e5df;
      }

      body.dark-mode {
        --bg-color: #121212;
        --section-color: #252525;
        --text-color: #e2e2e2;
        --link-color: #d4a373;
        --muted-color: #b6b6b6;
        --heading-color: #f1f1f1;
        --card-border: #3a3a3a;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        line-height: 1.75;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-wrap: break-word;
        word-break: break-word;
      }

      #policy-content {
        max-width: 860px;
        margin: clamp(24px, 4vw, 48px) auto;
        padding: clamp(20px, 4vw, 36px);
        overflow-wrap: break-word;
        word-break: break-word;
      }

      a {
        color: var(--link-color);
        text-decoration: none;
      }

      #policy-content h1,
      #policy-content h2,
      #policy-content h3,
      #policy-content h4 {
        color: var(--heading-color);
        line-height: 1.25;
        overflow-wrap: break-word;
        word-break: break-word;
      }

      #policy-content h1 {
        font-size: clamp(2rem, 4vw, 2.7rem);
        letter-spacing: -0.02em;
        margin-bottom: 0.3rem;
      }

      #policy-content h2 {
        font-size: clamp(1.35rem, 2.5vw, 1.8rem);
        margin-top: 2.2rem;
        margin-bottom: 0.8rem;
        scroll-margin-top: 1rem;
      }

      #policy-content h3 {
        font-size: clamp(1.15rem, 2vw, 1.35rem);
        margin-top: 1.8rem;
        margin-bottom: 0.55rem;
      }

      #policy-content h4 {
        font-size: 1.05rem;
        margin-top: 1.3rem;
        margin-bottom: 0.45rem;
      }

      #policy-content > p:first-of-type {
        color: var(--muted-color);
        font-size: 0.95rem;
        margin-bottom: 1.1rem;
      }

      #policy-content p {
        margin: 0 0 1rem;
      }

      #policy-content strong {
        font-weight: 600;
      }

      #policy-content a:hover {
        color: var(--link-color);
      }

      #content-list {
        margin-block: 1.25rem 1.8rem;
        background-color: var(--section-color);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: clamp(14px, 2vw, 22px);
      }

      #content-list a {
        color: var(--text-color);
        font-weight: 500;
      }

      #content-list ul {
        margin: 0;
        padding-left: 1.25rem;
      }

      #content-list li + li {
        margin-top: 0.45rem;
      }

      #policy-content :is(ul, ol) {
        margin: 0.7rem 0 1.2rem;
        padding-left: 1.45rem;
      }

      #policy-content :is(ul, ol) :is(ul, ol) {
        margin-top: 0.5rem;
        margin-bottom: 0.7rem;
        padding-left: 1.35rem;
      }

      #policy-content li {
        margin: 0.35rem 0;
        padding-left: 0.2rem;
      }

      #policy-content li::marker {
        color: var(--link-color);
      }

      #policy-content li > p {
        margin: 0.35rem 0;
      }

      @media (max-width: 640px) {
        #policy-content {
          padding: 16px;
        }

        #policy-content :is(ul, ol) {
          padding-left: 1.2rem;
        }

        #policy-content :is(ul, ol) :is(ul, ol) {
          padding-left: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="policy-content"></div>

    <script>
      const urlParams = new URLSearchParams(window.location.search)
      const policyLang = urlParams.get('lang') || 'en'
      const theme = urlParams.get('theme') || 'light'
      if (theme === 'dark') {
        document.body.classList.add('dark-mode')
      } else if (theme === 'light') {
        document.body.classList.add('light-mode')
      }

      fetch('langs/' + policyLang + '.html')
        .then((response) => {
          if (!response.ok) throw new Error('Translation not found')
          return response.text()
        })
        .then((html) => {
          document.getElementById('policy-content').innerHTML = html
        })
        .catch((error) => {
          fetch('langs/en.html')
            .then((response) => response.text())
            .then((html) => {
              document.getElementById('policy-content').innerHTML = html
            })
        })
    </script>
  </body>
</html>
